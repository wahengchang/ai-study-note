# Issue Dispatch Plan — 2026-04-17
# Generated by auditing the open issue queue and filtering for research/writing tasks.
# This file maps each eligible issue to its primary and supporting agents
# per the agent registry in claude/config.yaml.
#
# The cron/git-auto.md workflow consumes .automation/issues.json (local state)
# and processes one issue per run, lowest priority number first.

filter_criteria:
  included_types: [research, writing]
  excluded_types: [bug-fix, engineering, refactor]

dispatch:
  - issue: 61
    title: "(Research) 研究小紅書：寶藏開源項目，自動優化專業級提示詞"
    type: research
    primary_agent: writer
    supporting_agents: [reviewer]
    operational_requirements:
      - Web research to identify the open-source project referenced in XiaoHongShu post
      - Produce TL;DR, core feature breakdown, and applicability assessment
      - Output format: study note under content/prompt-notes/
    estimated_complexity: small
    branch: auto/issue-61

  - issue: 74
    title: "Write study note on Astron Agent, Serper, Jina AI, Python node, and LLM"
    type: writing
    primary_agent: writer
    supporting_agents: [diagram]
    operational_requirements:
      - Author note covering each tool's role, pricing model, and official links
      - Clarify component taxonomy (AI model vs tool vs platform vs logic node)
      - Include workflow diagram showing tool division of labor
      - Output format: study note under content/ai-tools/
    estimated_complexity: medium
    branch: auto/issue-74

  - issue: 75
    title: "Research learn note on LLM-based knowledge management with raw and wiki workflow"
    type: research+writing
    primary_agent: writer
    supporting_agents: [diagram]
    operational_requirements:
      - Research raw/wiki two-layer separation design
      - Explain ingest → structure → query → feedback cycle
      - Reference Andrej Karpathy and 林穎俊 approaches
      - Include Mermaid flow diagram (LR orientation)
      - Output format: learn note under content/knowledge-management/
    estimated_complexity: medium
    branch: auto/issue-75

  - issue: 76
    title: "Research AI-powered YouTube automation workflow from n8n video"
    type: research
    primary_agent: writer
    supporting_agents: [diagram]
    operational_requirements:
      - Decompose full video-to-publish pipeline from n8n YouTube video
      - Categorize tools by function (orchestration, LLM, visual, audio, rendering, publishing)
      - Assess no-code vs engineering integration reality
      - Propose minimum viable PoC architecture
      - Flag risks (content quality, copyright, YouTube policy)
      - Output format: research note + tool taxonomy under content/ai-tools/
    estimated_complexity: large
    branch: auto/issue-76

  - issue: 77
    title: "Research terminal multiplexing workflow that boosts Claude Code productivity"
    type: research
    primary_agent: writer
    supporting_agents: [reviewer]
    operational_requirements:
      - Identify actual tool referenced in XiaoHongShu post (cmux / Claude-specific tooling)
      - Compare cmux, tmux, zellij, WezTerm for Claude Code workflows
      - Produce comparison table and recommended minimal workflow
      - Output format: research note under content/dev-tools/
    estimated_complexity: small
    branch: auto/issue-77

excluded:
  - issue: 67
    title: "Fix duplicate article titles on ai-study-note pages"
    reason: "Bug fix requiring template/content convention change — not a research or writing task."

execution_order:
  description: >
    Per cron/git-auto.md §4, issues are processed one per run, lowest issue
    number first. Each run branches fresh from origin/main, implements via
    the assigned primary agent, validates with npm run quartz -- build,
    and opens one PR. Supporting agents run post-draft for QA or diagrams.
  sequence: [61, 74, 75, 76, 77]
