# Issue Dispatch Plan — Research & Writing Tasks
# Generated: 2026-04-12
# Source: GitHub issue queue audit (7 open issues → 5 filtered)
#
# This file maps filtered research/writing issues to the agent system
# defined in claude/config.yaml. The git-auto.md workflow consumes this
# plan to determine execution order and agent assignment.
#
# Execution order follows git-auto.md: lowest issue number first,
# one issue per branch, one branch per PR.

filter_criteria:
  included_labels: [documentation, enhancement]
  excluded_types: [bug-fix, infrastructure, framework-migration]

# ── Filtered OUT ──────────────────────────────────────────────────
# #67  Fix duplicate article titles        → bug fix (engineering)
# #63  Adopt Mintlify as new framework      → infrastructure (migration)

# ── Dispatch Queue ────────────────────────────────────────────────

queue:
  - issue: 61
    title: "Research: auto-optimize prompt project (小紅書)"
    type: research
    agents:
      primary: writer
      supporting: []
    output_path: content/prompt-notes/auto-optimize-prompt-research.md
    deliverables:
      - Project identification and repo/source link
      - TL;DR summary (3-5 lines)
      - Core feature inventory
      - Applicable use cases
      - Suitability assessment for ai-study-note
    requirements:
      - Web research to identify the open-source project
      - Structured research summary following writer agent template
    acceptance:
      - Source project confirmed
      - Readable research summary produced
      - At least 3 reusable takeaways
      - Inclusion/exclusion recommendation stated

  - issue: 74
    title: "Write study note on Astron Agent, Serper, Jina AI, Python node, and LLM"
    type: writing
    agents:
      primary: writer
      supporting: [diagram]
    output_path: content/ai-tools/astron-agent-serper-jina-workflow.md
    deliverables:
      - Article with clear tool definitions and roles
      - Pricing and free-tier summary per tool
      - Workflow component relationship explanation
      - Mermaid diagram showing how components connect in a pipeline
    requirements:
      - Structure content for non-technical readers
      - Distinguish model vs. tool vs. platform vs. logic node
      - Include official links for each tool
    acceptance:
      - Clear article title
      - Publishable draft or outline
      - Tool roles and pricing not conflated
      - Framed as workflow components, not a single AI tool

