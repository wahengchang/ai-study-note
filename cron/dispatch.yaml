    type: research-writing
    agents:
      primary: writer
      supporting: [diagram]
    output_path: content/knowledge-management/llm-raw-wiki-workflow.md
    deliverables:
      - Study note on raw/wiki two-layer separation
      - Explanation of AI-driven raw-to-wiki transformation
      - Mermaid diagram of the data flow (raw → AI → wiki → query → feedback)
      - Practical implementation guidance (IDE + Obsidian + Markdown + Git)
